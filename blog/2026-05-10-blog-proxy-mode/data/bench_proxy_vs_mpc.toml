#### Proxy vs MPC: full benchmark for the Proxy mode blog post ####
#
# One TOML drives every chart in the post. Run once for native, once for
# browser. Each section below mirrors a chart in the post.
#
# All groups use the realistic ZK authentication path on both sent and recv
# (reveal-sent-all = false, reveal-recv-all = false). The full-reveal fast
# path is intentionally NOT exercised here — that optimization is the
# subject of the follow-up post and would muddle the mode-comparison story.
#
# Suggested invocation (from crates/harness/):
#   sudo ./bin/runner bench \
#       --config blog-proxy-mode-draft/data/bench_proxy_vs_mpc.toml \
#       --output blog-proxy-mode-draft/data/metrics_native.csv
#   sudo ./bin/runner --target browser bench \
#       --config blog-proxy-mode-draft/data/bench_proxy_vs_mpc.toml \
#       --output blog-proxy-mode-draft/data/metrics_browser.csv
#
# Expected runtime per target: ~30-60 min depending on hardware.

############################################################################
# Section 1: representative real-world scenarios                            #
# (Cable / Fiber / Mobile 5G — same as bench.toml, both modes)              #
############################################################################

[[group]]
name = "scenario_cable_mpc"
proxy = false
reveal-sent-all = false
reveal-recv-all = false
bandwidth = 20
protocol_latency = 20
upload-size = 1024
download-size = 2048

[[group]]
name = "scenario_cable_proxy"
proxy = true
reveal-sent-all = false
reveal-recv-all = false
bandwidth = 20
protocol_latency = 20
upload-size = 1024
download-size = 2048

[[group]]
name = "scenario_fiber_mpc"
proxy = false
reveal-sent-all = false
reveal-recv-all = false
bandwidth = 100
protocol_latency = 15
upload-size = 1024
download-size = 2048

[[group]]
name = "scenario_fiber_proxy"
proxy = true
reveal-sent-all = false
reveal-recv-all = false
bandwidth = 100
protocol_latency = 15
upload-size = 1024
download-size = 2048

[[group]]
name = "scenario_mobile_5g_mpc"
proxy = false
reveal-sent-all = false
reveal-recv-all = false
bandwidth = 30
protocol_latency = 30
upload-size = 1024
download-size = 2048

[[group]]
name = "scenario_mobile_5g_proxy"
proxy = true
reveal-sent-all = false
reveal-recv-all = false
bandwidth = 30
protocol_latency = 30
upload-size = 1024
download-size = 2048

[[bench]]
group = "scenario_cable_mpc"
[[bench]]
group = "scenario_cable_proxy"
[[bench]]
group = "scenario_fiber_mpc"
[[bench]]
group = "scenario_fiber_proxy"
[[bench]]
group = "scenario_mobile_5g_mpc"
[[bench]]
group = "scenario_mobile_5g_proxy"

